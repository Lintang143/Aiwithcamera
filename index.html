<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budi - Debug Mode</title>
    <style>
        body { font-family: monospace; background: #000; color: #0f0; padding: 20px; text-align: center; }
        video { width: 100%; max-width: 500px; border: 2px solid #0f0; margin-bottom: 10px; }
        #log { background: #111; border: 1px solid #333; height: 200px; overflow-y: auto; text-align: left; padding: 10px; font-size: 12px; color: #ccc; }
        button { background: #0f0; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; margin: 5px; }
        .err { color: #ff5555; }
        .succ { color: #00ff00; }
    </style>
</head>
<body>
    <h1>BUDI AI - DEBUG CONSOLE</h1>
    <video id="vid" autoplay playsinline muted></video>
    <br>
    <button onclick="init()">1. Nyalakan Kamera</button>
    <button onclick="testVision()">2. Test Lihat (Debug)</button>
    
    <div id="log">Menunggu perintah...</div>

    <script>
        // PENTING: GANTI INI DENGAN API KEY ASLI ANDA DARI GROQ.COM
        const API_KEY = "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"; 
        
        // Model ID yang saat ini aktif di Groq (per Juni 2026)
        const MODEL_ID = "llama-3.2-11b-vision-preview"; 

        const logDiv = document.getElementById('log');
        const vid = document.getElementById('vid');
        let stream;

        function log(msg, type='') {
            const div = document.createElement('div');
            div.textContent = `> ${msg}`;
            if(type) div.className = type;
            logDiv.appendChild(div);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        async function init() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true });
                vid.srcObject = stream;
                log("Kamera berhasil dinyalakan.", "succ");
            } catch (e) {
                log("Gagal nyalakan kamera: " + e.message, "err");
            }
        }

        async function testVision() {
            if (!stream) return log("Kamera mati! Klik tombol 1 dulu.", "err");
            if (API_KEY.includes("XXXX")) return log("API KEY BELUM DIGANTI DI KODE!", "err");

            log("Mengambil frame gambar...", "succ");
            
            // Ambil Gambar
            const canvas = document.createElement('canvas');
            canvas.width = vid.videoWidth;
            canvas.height = vid.videoHeight;
            canvas.getContext('2d').drawImage(vid, 0, 0);
            const base64 = canvas.toDataURL('image/jpeg', 0.5).split(',')[1];

            log(`Mengirim ke Groq (Model: ${MODEL_ID})...`);

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: MODEL_ID,
                        messages: [{
                            role: "user",
                            content: [
                                { type: "text", text: "Halo, apa yang kamu lihat?" },
                                { type: "image_url", image_url: { url: `data:image/jpeg;base64,${base64}` } }
                            ]
                        }],
                        max_tokens: 50
                    })
                });

                const data = await res.json();

                if (!res.ok) {
                    // Tampilkan error detail dari Groq
                    log(`ERROR API: ${data.error?.message || "Unknown Error"}`, "err");
                    return;
                }

                const reply = data.choices?.[0]?.message?.content;
                if (reply) {
                    log(`BUDI: ${reply}`, "succ");
                } else {
                    log("Respons kosong dari API.", "err");
                }

            } catch (e) {
                log(`Error Jaringan/Code: ${e.message}`, "err");
            }
        }
    </script>
</body>
</html>
