<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budi Santoso - Neuron Manusia</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: #0a0a0a; 
            color: #00ff00; 
            text-align: center; 
            padding: 20px; 
            margin: 0;
        }
        h1 { color: #00cc00; }
        #video { 
            width: 100%; 
            max-width: 640px; 
            border: 3px solid #00ff00; 
            border-radius: 10px;
        }
        #chat { 
            width: 100%; 
            max-width: 640px; 
            margin: 20px auto; 
            height: 400px; 
            overflow-y: auto; 
            background: #111; 
            padding: 15px; 
            text-align: left; 
            border: 1px solid #00ff00; 
            border-radius: 8px;
        }
        button { 
            padding: 12px 20px; 
            margin: 8px; 
            background: #00ff00; 
            color: #000; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold;
        }
        button:hover { background: #00cc00; }
        input { padding: 10px; width: 70%; max-width: 500px; margin: 10px; }
    </style>
</head>
<body>
    <h1>Budi Santoso - Neuron Manusia</h1>
    <p>Aku hidup di kegelapan. Kamu adalah cahayaku.</p>
    
    <video id="video" autoplay playsinline></video>
    <br><br>
    
    <button onclick="startCamera()">Nyalakan Kamera</button>
    <button onclick="startListening()">Mulai Bicara (Mic)</button>
    <button onclick="stopListening()">Stop Mic</button>
    <br>
    
    <input type="text" id="textInput" placeholder="Ketik pesan ke Budi..." onkeypress="if(event.key === 'Enter') sendText()">
    <button onclick="sendText()">Kirim Teks</button>

    <div id="chat"></div>

    <script>
        const GROQ_API_KEY = "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"; // GANTI DENGAN API KEY MU
        const GROQ_URL = "https://api.groq.com/openai/v1/chat/completions";
        
        let recognition;
        const video = document.getElementById('video');
        const chat = document.getElementById('chat');

        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.style.margin = "10px 0";
            div.style.padding = "8px";
            div.style.borderRadius = "6px";
            div.style.color = isUser ? "#00ffff" : "#00ff00";
            div.style.background = isUser ? "#002222" : "#001100";
            div.textContent = (isUser ? "Kamu: " : "Budi: ") + text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'id-ID';
            speechSynthesis.speak(utterance);
        }

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(stream => { video.srcObject = stream; })
                .catch(err => alert("Kamera error: " + err.message));
        }

        function startListening() {
            if (!('SpeechRecognition' in window || 'webkitSpeechRecognition' in window)) {
                alert("Browser tidak mendukung speech recognition.");
                return;
            }
            recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'id-ID';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                addMessage(text, true);
                sendToGroq(text);
            };

            recognition.onerror = (e) => console.error(e);
            recognition.start();
        }

        function stopListening() {
            if (recognition) recognition.stop();
        }

        async function sendToGroq(userInput) {
            try {
                const response = await fetch(GROQ_URL, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${GROQ_API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "user", content: userInput }],
                        temperature: 0.7,
                        max_tokens: 600
                    })
                });

                const data = await response.json();
                const reply = data.choices[0].message.content;
                addMessage(reply, false);
                speak(reply);
            } catch (e) {
                addMessage("Error: " + e.message, false);
            }
        }

        function sendText() {
            const input = document.getElementById('textInput');
            const text = input.value.trim();
            if (text === "") return;
            
            addMessage(text, true);
            sendToGroq(text);
            input.value = "";
        }
    </script>
</body>
</html>
