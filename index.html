<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budi Santoso - Neuron Vision</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0a0a0a; color: #00ff00; text-align: center; padding: 20px; margin: 0; }
        h1 { color: #00cc00; }
        #video { width: 100%; max-width: 640px; border: 3px solid #00ff00; border-radius: 10px; }
        #chat { width: 100%; max-width: 640px; margin: 20px auto; height: 400px; overflow-y: auto; background: #111; padding: 15px; text-align: left; border: 1px solid #00ff00; border-radius: 8px; }
        button { padding: 12px 20px; margin: 8px; background: #00ff00; color: #000; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #00cc00; }
        input { padding: 10px; width: 70%; max-width: 500px; margin: 10px; }
    </style>
</head>
<body>
    <h1>Budi Santoso - Neuron Vision</h1>
    <p>Aku sekarang bisa melihat lewat kamera mu.</p>
    
    <video id="video" autoplay playsinline></video>
    <br><br>
    
    <button onclick="startCamera('user')">Kamera Depan</button>
    <button onclick="startCamera('environment')">Kamera Belakang</button>
    <button onclick="captureAndAsk()">Apa yang kamu lihat?</button>
    <button onclick="startListening()">Mulai Bicara (Mic)</button>
    <button onclick="stopListening()">Stop Mic</button>
    <br>
    
    <input type="text" id="textInput" placeholder="Ketik pesan..." onkeypress="if(event.key === 'Enter') sendText()">
    <button onclick="sendText()">Kirim</button>

    <div id="chat"></div>

    <script>
        const GROQ_API_KEY = "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"; // GANTI DENGAN API KEY MU
        const GROQ_URL = "https://api.groq.com/openai/v1/chat/completions";
        
        let recognition, currentStream;
        const video = document.getElementById('video');
        const chat = document.getElementById('chat');

        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.style.margin = "10px 0";
            div.style.padding = "8px";
            div.style.borderRadius = "6px";
            div.style.color = isUser ? "#00ffff" : "#00ff00";
            div.style.background = isUser ? "#002222" : "#001100";
            div.textContent = (isUser ? "Kamu: " : "Budi: ") + text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'id-ID';
            speechSynthesis.speak(utterance);
        }

        function startCamera(facingMode) {
            // Stop stream lama jika ada
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: facingMode } 
            })
            .then(stream => { 
                currentStream = stream;
                video.srcObject = stream; 
                addMessage(`Kamera ${facingMode === 'user' ? 'depan' : 'belakang'} sudah aktif.`, false);
            })
            .catch(err => alert("Gagal mengakses kamera: " + err.message));
        }

        async function captureAndAsk() {
            if (!video.srcObject) {
                addMessage("Nyalakan kamera dulu!", false);
                return;
            }
            
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            const base64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
            
            addMessage("Sedang melihat...", false);
            
            try {
                const response = await fetch(GROQ_URL, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${GROQ_API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.2-11b-vision-preview",
                        messages: [
                            {
                                role: "user",
                                content: [
                                    { type: "text", text: "Deskripsikan secara detail dan jujur apa yang kamu lihat di gambar ini. Jawab dalam bahasa Indonesia." },
                                    { type: "image_url", image_url: { url: `data:image/jpeg;base64,${base64}` } }
                                ]
                            }
                        ],
                        temperature: 0.7,
                        max_tokens: 500
                    })
                });

                const data = await response.json();
                const reply = data.choices[0].message.content;
                addMessage(reply, false);
                speak(reply);
            } catch (e) {
                addMessage("Error melihat gambar: " + e.message, false);
            }
        }

        function startListening() {
            if (!('SpeechRecognition' in window || 'webkitSpeechRecognition' in window)) {
                alert("Browser tidak mendukung mic.");
                return;
            }
            recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'id-ID';
            recognition.onresult = (e) => {
                const text = e.results[0][0].transcript;
                addMessage(text, true);
                sendToGroq(text);
            };
            recognition.start();
        }

        function stopListening() {
            if (recognition) recognition.stop();
        }

        async function sendToGroq(text) {
            try {
                const res = await fetch(GROQ_URL, {
                    method: "POST",
                    headers: { 
                        "Authorization": `Bearer ${GROQ_API_KEY}`, 
                        "Content-Type": "application/json" 
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "user", content: text }],
                        temperature: 0.7
                    })
                });
                const data = await res.json();
                const reply = data.choices[0].message.content;
                addMessage(reply, false);
                speak(reply);
            } catch (e) { 
                addMessage("Error: " + e.message, false); 
            }
        }

        function sendText() {
            const input = document.getElementById('textInput');
            const text = input.value.trim();
            if (!text) return;
            addMessage(text, true);
            sendToGroq(text);
            input.value = "";
        }
    </script>
</body>
</html>
